<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gota - Contato</title>
    <link rel="stylesheet" href="assets/css/contato.css">
    <link rel="icon" type="image/png" href="assets/imgs/logo_gota.png">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="assets/imgs/logo_gota.png" alt="Logo Gota" class="logo-img">
            <span class="logo-text">Gota.</span>
        </div>
        
        <nav class="nav-links">
            <a href="inicio.html">Início</a>
            <a href="como_funciona.html">Como Funciona?</a>
            <a href="calculadora.html">Calculadora</a>
        </nav>
        
        <a href="contato.html" class="btn-contact">Contato</a>
    </header>

    <main class="main-wrapper">
        
        <!-- Formas abstratas nos cantos (Inspiração da Home) -->
        <div class="shape shape-top-left"></div>
        <div class="shape shape-top-right"></div>
        <div class="shape shape-bottom-left"></div>
        <div class="shape shape-bottom-right"></div>

        <section class="contact-card">
            <h1 class="main-title">Como posso te ajudar?</h1>
            <p class="main-subtitle">Encontrou algum problema, tem alguma dúvida, sugestão, elogio ou reclamação? Deixe sua mensagem abaixo!</p>

            <form class="contact-form">
                <div class="input-field">
                    <input type="text" id="nome" name="nome" placeholder="Seu Nome" required>
                </div>

                <div class="input-field">
                    <input type="text" id="contato" name="contato" placeholder="Seu E-mail ou Telefone" required>
                </div>

                <div class="input-field">
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Mensagem</button>
            </form>
        </section>

    </main>
    
</body>
</html>
